# Automated version bump and changelog generation on merge to main
# Uses Commitizen to analyze conventional commits and determine version bump
#
# Trigger: Push to main (typically via merged PR)
# Actions: Bump version in pyproject.toml, update CHANGELOG.md, create git tag,
# create GitHub Release, and synchronize dev with the final main commit.

name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bump-version:
    name: Bump version and create release
    runs-on: ${{ fromJSON(vars.CI_RUNNER_LABELS_JSON || '["self-hosted","linux","arm64"]') }}
    # Skip if commit message already contains version bump (avoid infinite loop)
    if: "!startsWith(github.event.head_commit.message, 'bump:')"

    permissions:
      contents: read

    steps:
      - name: Create release write token
        id: release-write-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.PY_LIB_AUTOMATION_CLIENT_ID }}
          private-key: ${{ secrets.PY_LIB_AUTOMATION_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
          permission-workflows: write

      - name: Create shared package read token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.PY_LIB_AUTOMATION_CLIENT_ID }}
          private-key: ${{ secrets.PY_LIB_AUTOMATION_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }},py-lib-starter
          permission-contents: read

      - name: Verify automation access
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REQUIRED_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          if ! gh api "repos/${REQUIRED_REPOSITORY}" >/dev/null; then
            echo "::error::The betabitplus-py-lib-automation GitHub App cannot access ${REQUIRED_REPOSITORY}. Install or re-authorize the App for this repository."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Full history for changelog generation
          token: ${{ steps.release-write-token.outputs.token }}

      - name: Set up dev environment
        uses: ./.github/actions/setup-dev-env
        with:
          python-version: "3.13"
          shared-package-token: ${{ steps.app-token.outputs.token }}

      - name: Validate main commit subject
        run: |
          set -euo pipefail
          main_subject="$(git log -1 --format=%s)"
          uv run python -m \
            py_lib_tooling._internal.quality_gates.change_title \
            "$main_subject"

      - name: Configure Git as the automation App
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          app_slug="${{ steps.app-token.outputs.app-slug }}"
          app_user_id="$(gh api "/users/${app_slug}[bot]" --jq .id)"
          git config --local user.name "${app_slug}[bot]"
          git config --local user.email "${app_user_id}+${app_slug}[bot]@users.noreply.github.com"

      - name: Bump version and update changelog
        id: cz
        run: |
          set -euo pipefail

          cz() {
            uv run cz "$@"
          }

          # Get current version before bump
          CURRENT_VERSION=$(cz version --project)
          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

          set +e
          DRY_RUN_OUTPUT=$(cz bump --changelog --dry-run --yes 2>&1)
          DRY_RUN_STATUS=$?
          set -e

          printf '%s\n' "$DRY_RUN_OUTPUT"

          initial_release_without_prior_tag() {
            local status="$1"
            local output="$2"

            if [ "$status" -ne 16 ]; then
              return 1
            fi
            if ! grep -q '^tag to create:' <<<"$output"; then
              return 1
            fi
            if ! grep -q '^No tag found to do an incremental changelog$' <<<"$output"; then
              return 1
            fi

            return 0
          }

          bump_without_changelog_update() {
            python3 <<'PY'
          from pathlib import Path

          path = Path("pyproject.toml")
          text = path.read_text(encoding="utf-8")
          old = "update_changelog_on_bump = true"
          if old not in text:
              raise SystemExit("Missing Commitizen changelog setting")
          path.write_text(
              text.replace(old, "update_changelog_on_bump = false", 1),
              encoding="utf-8",
          )
          PY

            set +e
            cz bump --yes
            bump_status=$?
            set -e

            python3 <<'PY'
          from pathlib import Path

          path = Path("pyproject.toml")
          text = path.read_text(encoding="utf-8")
          old = "update_changelog_on_bump = false"
          if old not in text:
              raise SystemExit("Missing temporary Commitizen changelog setting")
          path.write_text(
              text.replace(old, "update_changelog_on_bump = true", 1),
              encoding="utf-8",
          )
          PY

            if [ "$bump_status" -eq 0 ]; then
              tag_name="v$(cz version --project)"
              git add pyproject.toml uv.lock
              git commit --amend --no-edit
              git tag -d "$tag_name"
              git tag -a "$tag_name" -m "$tag_name"
            fi

            return "$bump_status"
          }

          if [ "$DRY_RUN_STATUS" -eq 0 ]; then
            cz bump --changelog --yes
            NEW_VERSION=$(cz version --project)
            echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          elif initial_release_without_prior_tag "$DRY_RUN_STATUS" "$DRY_RUN_OUTPUT"; then
            bump_without_changelog_update
            NEW_VERSION=$(cz version --project)
            echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          elif [ "$DRY_RUN_STATUS" -eq 3 ] || [ "$DRY_RUN_STATUS" -eq 21 ]; then
            echo "No version bump needed (no feat/fix commits since last release)"
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          else
            echo "Commitizen bump dry-run failed with exit code $DRY_RUN_STATUS" >&2
            exit "$DRY_RUN_STATUS"
          fi

      - name: Validate release bump scope
        if: steps.cz.outputs.bumped == 'true'
        run: |
          set -euo pipefail

          git diff --check HEAD^ HEAD
          if ! git diff --quiet; then
            git diff --check
          fi

          changed_files="$(
            {
              git diff --name-only HEAD^ HEAD
              git diff --name-only
            } | sort -u
          )"
          while IFS= read -r path; do
            [ -n "$path" ] || continue
            case "$path" in
              CHANGELOG.md|pyproject.toml|uv.lock) ;;
              *)
                echo "Release bump modified unapproved path: $path" >&2
                echo "Only CHANGELOG.md, pyproject.toml, and uv.lock may change during generated release bumps." >&2
                exit 1
                ;;
            esac
          done <<< "$changed_files"

      - name: Push changes and tags
        if: steps.cz.outputs.bumped == 'true'
        run: |
          # Use checkout credentials for repository writes, not dependency-read credentials.
          unset GIT_CONFIG_COUNT GIT_CONFIG_KEY_0 GIT_CONFIG_VALUE_0
          git push origin main --follow-tags

      - name: Create GitHub Release
        if: steps.cz.outputs.bumped == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.cz.outputs.new_version }}
          name: Release v${{ steps.cz.outputs.new_version }}
          body_path: CHANGELOG.md
          token: ${{ steps.release-write-token.outputs.token }}

      - name: Synchronize dev with main
        run: |
          set -euo pipefail

          # Use checkout credentials for repository writes, not dependency-read credentials.
          unset GIT_CONFIG_COUNT GIT_CONFIG_KEY_0 GIT_CONFIG_VALUE_0

          git fetch origin main
          main_sha="$(git rev-parse origin/main)"

          if git ls-remote --exit-code --heads origin dev >/dev/null; then
            git fetch origin dev
            dev_sha="$(git rev-parse origin/dev)"

            if [ "${dev_sha}" = "${main_sha}" ]; then
              echo "origin/dev already matches origin/main."
              exit 0
            fi

            if git merge-base --is-ancestor "${dev_sha}" "${main_sha}"; then
              git push origin "${main_sha}:refs/heads/dev"
              exit 0
            fi

            represented_main_sha="${main_sha}"
            main_subject="$(git log -1 --format=%s "${main_sha}")"
            if [ "${main_subject#bump:}" != "${main_subject}" ]; then
              represented_main_sha="${main_sha}^"
            fi

            if [ "$(git rev-parse "${represented_main_sha}^{tree}")" = "$(git rev-parse "${dev_sha}^{tree}")" ]; then
              echo "origin/dev tree matches ${represented_main_sha}; moving dev to final main with an exact lease."
              git push origin "${main_sha}:refs/heads/dev" \
                --force-with-lease="refs/heads/dev:${dev_sha}"
              exit 0
            fi

            dev_unique_commits="$(
              git log --right-only --cherry-pick --oneline "${main_sha}...${dev_sha}"
            )"
            if [ -n "${dev_unique_commits}" ]; then
              echo "origin/dev contains commits not represented on origin/main; refusing to move dev." >&2
              printf '%s\n' "${dev_unique_commits}" >&2
              exit 1
            fi

            echo "origin/dev contains only patch-equivalent rebased commits; moving dev to main with an exact lease."
            git push origin "${main_sha}:refs/heads/dev" \
              --force-with-lease="refs/heads/dev:${dev_sha}"
          else
            git push origin "${main_sha}:refs/heads/dev"
          fi
