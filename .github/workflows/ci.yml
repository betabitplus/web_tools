# CI Pipeline
# Thin generated orchestration over reusable starter-owned CI workflows.
# Set CI_RUNNER_LABELS_JSON on the generated repo or organization to switch
# between local self-hosted Linux runners and GitHub-hosted runners. Default is
# ["self-hosted","linux","arm64"].

name: CI

on:
  workflow_dispatch:
  push:
    branches: [dev]
  pull_request:
    branches: [main, dev]
    types: [opened, edited, synchronize, reopened, ready_for_review]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  main-pr-source-policy:
    name: Main PR Source Policy
    runs-on: ${{ fromJSON(vars.CI_RUNNER_LABELS_JSON || '["self-hosted","linux","arm64"]') }}
    permissions:
      contents: read

    steps:
      - name: Enforce main PR source repository and branch
        if: ${{ github.event_name == 'pull_request' && github.base_ref == 'main' }}
        env:
          HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          BASE_REPOSITORY: ${{ github.repository }}
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          if [ "${HEAD_REPOSITORY}" != "${BASE_REPOSITORY}" ] || [ "${HEAD_BRANCH}" != "dev" ]; then
            echo "Only the same repository's dev branch may open pull requests to main." >&2
            echo "Saw source repository: ${HEAD_REPOSITORY}" >&2
            echo "Saw target repository: ${BASE_REPOSITORY}" >&2
            echo "Saw source branch: ${HEAD_BRANCH}" >&2
            exit 1
          fi

      - name: Accept CI event routing
        run: echo "CI event routing accepted."

  baseline:
    needs: main-pr-source-policy
    name: Baseline Repo Verification
    uses: betabitplus/py-lib-starter/.github/workflows/python-lib-ci-baseline.yml@v0.25.1
    with:
      python-version: "3.13"
    secrets: inherit

  package:
    needs: main-pr-source-policy
    name: Package Verification
    uses: betabitplus/py-lib-starter/.github/workflows/python-lib-ci-package.yml@v0.25.1
    with:
      python-version: "3.13"
    secrets: inherit

  e2e-slices:
    needs: main-pr-source-policy
    name: E2E Slice (${{ matrix.name }})
    uses: betabitplus/py-lib-starter/.github/workflows/python-lib-ci-e2e-slice.yml@v0.25.1
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: public-boundary
            path: tests/web_tools/e2e/public_boundary
          - name: examples
            path: tests/web_tools/e2e/examples
          - name: fetch-cache-and-page-artifacts
            path: tests/web_tools/e2e/fetch_cache_and_page_artifacts
          - name: html-conversion-and-visual-manifest
            path: tests/web_tools/e2e/html_conversion_and_visual_manifest
          - name: media-extraction-and-download-policy
            path: tests/web_tools/e2e/media_extraction_and_download_policy
          - name: public-output-and-errors
            path: tests/web_tools/e2e/public_output_and_errors
          - name: quote-text-and-elements
            path: tests/web_tools/e2e/quote_text_and_elements
    with:
      python-version: "3.13"
      e2e-path: ${{ matrix.path }}
      playwright-browsers: "chromium"
    secrets: inherit

  merge-gate:
    name: ci/merge-gate
    runs-on: ${{ fromJSON(vars.CI_RUNNER_LABELS_JSON || '["self-hosted","linux","arm64"]') }}
    needs:
      - main-pr-source-policy
      - baseline
      - package
      - e2e-slices
    if: ${{ always() }}
    permissions:
      contents: read

    steps:
      - name: Require all CI jobs to pass
        run: |
          set -euo pipefail
          source_policy="${{ needs['main-pr-source-policy'].result }}"
          baseline="${{ needs.baseline.result }}"
          package="${{ needs.package.result }}"
          e2e_slices="${{ needs['e2e-slices'].result }}"

          if [ "${source_policy}" != "success" ] ||
             [ "${baseline}" != "success" ] ||
             [ "${package}" != "success" ] ||
             [ "${e2e_slices}" != "success" ]; then
            printf 'CI job results: main-pr-source-policy=%s baseline=%s package=%s e2e-slices=%s\n' \
              "${source_policy}" "${baseline}" "${package}" "${e2e_slices}" >&2
            exit 1
          fi
